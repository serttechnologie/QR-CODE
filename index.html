<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>QRgen Studio — V1</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Bricolage+Grotesque:wght@400;600;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root {
  --bg: #f5f2eb; --paper: #fdfbf7; --ink: #1a1814; --mid: #8a8578;
  --accent: #d4621a; --border: #d8d3c8; --mono: 'DM Mono', monospace; --sans: 'Bricolage Grotesque', sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
body { background:var(--bg); color:var(--ink); font-family:var(--sans); min-height:100vh; display:flex; flex-direction:column; overflow-x: hidden; }

/* --- HEADER --- */
header { border-bottom:2px solid var(--ink); padding:0 15px; display:flex; align-items:stretch; justify-content:space-between; background:var(--paper); position:sticky; top:0; z-index:100; height:60px; }
.logo { display:flex; align-items:center; gap:8px; }
.logo-icon { width:22px; height:22px; background:var(--ink); border-radius:4px; display:grid; grid-template-columns:1fr 1fr; gap:2px; padding:4px; }
.logo-icon span { background:var(--paper); border-radius:1px; }
.logo h1 { font-size:0.9rem; font-weight:800; }

nav { display:flex; }
.tab { font-family:var(--mono); font-size:.75rem; padding:0 15px; border:none; border-bottom:3px solid transparent; background:transparent; color:var(--mid); cursor:pointer; font-weight:600; }
.tab.active { color:var(--ink); border-bottom-color:var(--accent); }
.badge { background:var(--accent); color:white; border-radius:10px; padding:1px 6px; font-size:.6rem; margin-left:4px; }

/* --- VIEWS --- */
.view { display:none; animation: fadeIn 0.2s ease; }
.view.active { display:block; }
@keyframes fadeIn { from{opacity:0; transform:translateY(5px)} to{opacity:1; transform:translateY(0)} }

/* --- CREATE --- */
.create-wrap { max-width:500px; margin:0 auto; padding:30px 20px; display:flex; flex-direction:column; gap:20px; }
.field-group { display:flex; flex-direction:column; gap:6px; }
label { font-size:.8rem; font-weight:700; color:var(--mid); }
input, textarea { font-family:var(--mono); font-size:16px; background:var(--paper); border:1.5px solid var(--border); border-radius:12px; padding:14px; width:100%; outline:none; }
.btn-main { background:var(--ink); color:var(--paper); border:none; border-radius:14px; padding:18px; font-weight:800; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:10px; }

/* --- GALLERY --- */
.gallery-wrap { max-width:1000px; margin:0 auto; padding:15px; }
.tool-bar { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
.backup-zone { background: #efebe2; border: 1.5px dashed var(--border); padding: 10px; border-radius: 12px; display: flex; gap: 8px; }
.btn-small { flex: 1; padding: 10px; border-radius: 10px; font-size: 0.65rem; font-weight: 700; border: 1px solid var(--ink); background: var(--paper); cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; }

.filter-bar { display: flex; gap: 8px; }
.f-btn { padding: 8px 16px; border-radius: 20px; border: 1.5px solid var(--border); background: var(--paper); font-size: 0.75rem; font-weight: 700; cursor: pointer; }
.f-btn.active { background: var(--ink); color: white; border-color: var(--ink); }

.gallery-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(140px, 1fr)); gap:12px; }
.qr-card { background:var(--paper); border:1.5px solid var(--border); border-radius:14px; padding:10px; position:relative; cursor: pointer; text-align:center; }
.qr-card img { width:100%; border-radius:6px; margin-bottom:8px; display: block; }
.qr-card h3 { font-size: 0.75rem; font-weight: 700; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.fav-btn { position: absolute; top: 8px; right: 8px; background: none; border: none; font-size: 1.2rem; cursor: pointer; color: var(--accent); z-index: 10; }

/* --- FOCUS OVERLAY --- */
.focus-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(245, 242, 235, 0.98); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); z-index: 200; display: none; flex-direction: column; align-items:center; justify-content: center; padding: 20px; }
.focus-container { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; max-width: 450px; }
.nav-arrow { background: var(--ink); color: white; border: none; width: 42px; height: 42px; border-radius: 50%; flex-shrink:0; cursor: pointer; font-weight: bold; }
.focus-card { background: var(--paper); border: 2px solid var(--ink); border-radius: 24px; padding: 30px 15px; width: 100%; flex: 1; display: flex; flex-direction: column; align-items: center; gap: 15px; position: relative; box-shadow: 0 15px 40px rgba(0,0,0,0.1); }
.qr-display-area { background: white; padding: 12px; border-radius: 12px; border: 1px solid var(--border); width: 220px; height: 220px; display: flex; align-items: center; justify-content: center; }
.qr-display-area img { width: 100%; height: 100%; }
.focus-fav-toggle { position: absolute; top: 20px; right: 20px; background: none; border: none; font-size: 1.8rem; color: var(--accent); cursor: pointer; }

.toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:var(--ink); color:white; padding:10px 20px; border-radius:50px; font-size:0.75rem; z-index:1000; opacity:0; transition:0.3s; pointer-events:none; }
.toast.show { opacity:1; }

#temp-qr { position: absolute; left: -9999px; top: 0; background: white; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon"><span></span><span></span><span></span><span></span></div>
    <h1>QRgen V1</h1>
  </div>
  <nav>
    <button class="tab active" onclick="switchView('create', this)">Créer</button>
    <button class="tab" onclick="switchView('gallery', this)">Galerie <span class="badge" id="b-total">0</span></button>
  </nav>
</header>

<div id="temp-qr"></div>

<!-- MODE FOCUS -->
<div id="focus-mode" class="focus-overlay">
    <div class="focus-container">
        <button class="nav-arrow" onclick="navFocus(-1)">←</button>
        <div class="focus-card">
            <button class="focus-fav-toggle" id="focus-fav-btn">☆</button>
            <h2 id="focus-title" style="font-size:1.1rem; font-weight:800; text-align:center; max-width: 80%;">Titre</h2>
            <div class="qr-display-area" id="focus-qr-display"></div>
            <p id="focus-text" style="font-family:var(--mono); font-size:0.65rem; color:var(--mid); text-align:center; word-break:break-all;"></p>
            <div style="display:flex; gap:8px; width:100%">
                <button class="btn-small" style="background:var(--ink); color:white" id="focus-dl">Télécharger</button>
                <button class="btn-small" style="border-color:#ff4444; color:#ff4444" id="focus-del">Supprimer</button>
            </div>
        </div>
        <button class="nav-arrow" onclick="navFocus(1)">→</button>
    </div>
    <button class="btn-main" style="margin-top:20px; padding:12px 30px;" onclick="closeFocus()">Fermer</button>
</div>

<!-- VUE CREATION -->
<main id="view-create" class="view active">
  <div class="create-wrap">
    <h2 style="font-size:1.8rem; font-weight:800;">Nouveau <span style="color:var(--accent)">QR Code</span></h2>
    <div class="field-group">
      <label>Nom du QR</label>
      <input type="text" id="in-title" placeholder="Ex: WiFi Maison" maxlength="25">
    </div>
    <div class="field-group">
      <label>Lien ou Texte</label>
      <textarea id="in-text" rows="3" placeholder="https://..."></textarea>
    </div>
    <button class="btn-main" onclick="createNew()">Générer et Enregistrer</button>
  </div>
</main>

<!-- VUE GALERIE -->
<main id="view-gallery" class="view">
  <div class="gallery-wrap">
    <div class="tool-bar">
        <div class="backup-zone">
            <button class="btn-small" onclick="exportData()">💾 Sauvegarder</button>
            <label class="btn-small">📂 Restaurer <input type="file" style="display:none" accept=".json" onchange="importData(event)"></label>
        </div>
        <div class="filter-bar">
            <button class="f-btn active" id="f-all" onclick="setFilter('all')">Tous</button>
            <button class="f-btn" id="f-fav" onclick="setFilter('fav')">★ Favoris</button>
        </div>
    </div>
    <div id="display-grid" class="gallery-grid"></div>
    <div id="empty-msg" style="display:none; text-align:center; padding:50px; color:var(--mid); font-size:0.8rem;">Aucun QR trouvé.</div>
  </div>
</main>

<div id="toast" class="toast"></div>

<script>
let items = JSON.parse(localStorage.getItem('qr_items_v1') || '[]');
let currentFocusIdx = -1;
let currentFilter = 'all';
let filteredList = [];

function save() {
    localStorage.setItem('qr_items_v1', JSON.stringify(items));
    document.getElementById('b-total').textContent = items.length;
}

function switchView(v, btn) {
    document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
    document.getElementById('view-' + v).classList.add('active');
    btn.classList.add('active');
    if(v === 'gallery') render();
}

function createNew() {
    const t = document.getElementById('in-title').value.trim();
    const txt = document.getElementById('in-text').value.trim();
    if(!t || !txt) return showToast("Champs vides !");

    const tempArea = document.getElementById('temp-qr');
    tempArea.innerHTML = ""; 
    
    new QRCode(tempArea, { text: txt, width: 400, height: 400, correctLevel: QRCode.CorrectLevel.H });

    setTimeout(() => {
        const canvas = tempArea.querySelector('canvas');
        const img = tempArea.querySelector('img');
        let finalImg = (img && img.src.startsWith('data:image')) ? img.src : (canvas ? canvas.toDataURL("image/png") : "");

        if (finalImg) {
            items.unshift({ id: Date.now(), title: t, text: txt, img: finalImg, fav: false });
            save();
            document.getElementById('in-title').value = '';
            document.getElementById('in-text').value = '';
            showToast("QR Ajouté !");
        } else {
            showToast("Erreur de calcul...");
        }
    }, 450); 
}

function setFilter(f) {
    currentFilter = f;
    document.getElementById('f-all').classList.toggle('active', f === 'all');
    document.getElementById('f-fav').classList.toggle('active', f === 'fav');
    render();
}

function render() {
    filteredList = items.filter(i => currentFilter === 'all' || i.fav);
    const cont = document.getElementById('display-grid');
    cont.innerHTML = '';
    document.getElementById('empty-msg').style.display = filteredList.length === 0 ? 'block' : 'none';

    filteredList.forEach((item, index) => {
        const div = document.createElement('div');
        div.className = 'qr-card';
        div.onclick = () => openFocus(index);
        div.innerHTML = `
            <button class="fav-btn" onclick="event.stopPropagation(); toggleFav(${item.id})">${item.fav?'★':'☆'}</button>
            <img src="${item.img}">
            <h3>${item.title}</h3>
        `;
        cont.appendChild(div);
    });
}

function openFocus(index) {
    if (index < 0 || index >= filteredList.length) return;
    currentFocusIdx = index;
    const item = filteredList[index];
    
    document.getElementById('focus-title').textContent = item.title;
    document.getElementById('focus-text').textContent = item.text;
    document.getElementById('focus-qr-display').innerHTML = `<img src="${item.img}">`;
    document.getElementById('focus-fav-btn').textContent = item.fav ? '★' : '☆';
    
    document.getElementById('focus-fav-btn').onclick = () => {
        toggleFav(item.id);
        openFocus(currentFocusIdx);
    };

    document.getElementById('focus-del').onclick = () => {
        if(confirm("Supprimer ?")) {
            items = items.filter(i => i.id !== item.id);
            save(); render();
            if(filteredList.length > 0) openFocus(Math.min(index, filteredList.length - 1));
            else closeFocus();
        }
    };

    document.getElementById('focus-dl').onclick = () => {
        const a = document.createElement('a'); a.href = item.img; a.download = `${item.title}.png`; a.click();
    };

    document.getElementById('focus-mode').style.display = 'flex';
    document.body.style.overflow = 'hidden';
}

function navFocus(dir) {
    let next = currentFocusIdx + dir;
    if(next < 0) next = filteredList.length - 1;
    if(next >= filteredList.length) next = 0;
    openFocus(next);
}

function closeFocus() {
    document.getElementById('focus-mode').style.display = 'none';
    document.body.style.overflow = 'auto';
    render();
}

function toggleFav(id) {
    const idx = items.findIndex(x => x.id === id);
    items[idx].fav = !items[idx].fav;
    save();
    if(document.getElementById('focus-mode').style.display !== 'flex') render();
}

function exportData() {
    if(!items.length) return;
    const blob = new Blob([JSON.stringify(items)], {type:'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'QRgen_backup.json';
    a.click();
}

function importData(e) {
    const file = e.target.files[0];
    const reader = new FileReader();
    reader.onload = (ev) => {
        try {
            items = JSON.parse(ev.target.result);
            save(); render();
            showToast("Import réussi !");
        } catch(err) { showToast("Erreur fichier"); }
    };
    reader.readAsText(file);
}

function showToast(m) {
    const t = document.getElementById('toast');
    t.textContent = m; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
}

document.getElementById('b-total').textContent = items.length;
</script>
</body>
</html>
