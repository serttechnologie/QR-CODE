<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>QRgen Studio — OCR Precision</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Bricolage+Grotesque:wght@400;600;800&display=swap" rel="stylesheet">

<!-- Bibliothèques : QR, OCR et CROPPER -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

<style>
:root {
  --bg: #f5f2eb; --paper: #fdfbf7; --ink: #1a1814; --mid: #8a8578;
  --accent: #d4621a; --border: #d8d3c8; --mono: 'DM Mono', monospace; --sans: 'Bricolage Grotesque', sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
body { background:var(--bg); color:var(--ink); font-family:var(--sans); min-height:100vh; overflow-x: hidden; }

/* --- UI BASIQUE --- */
header { border-bottom:2px solid var(--ink); padding:0 15px; display:flex; justify-content:space-between; background:var(--paper); position:sticky; top:0; z-index:100; height:60px; }
.logo { display:flex; align-items:center; gap:8px; }
.logo-icon { width:22px; height:22px; background:var(--ink); border-radius:4px; display:grid; grid-template-columns:1fr 1fr; gap:2px; padding:4px; }
.logo-icon span { background:var(--paper); border-radius:1px; }
nav { display:flex; }
.tab { font-family:var(--mono); font-size:.75rem; padding:0 15px; border:none; border-bottom:3px solid transparent; background:transparent; color:var(--mid); cursor:pointer; font-weight:600; }
.tab.active { color:var(--ink); border-bottom-color:var(--accent); }

.view { display:none; padding:20px; }
.view.active { display:block; }

.create-wrap { max-width:500px; margin:0 auto; display:flex; flex-direction:column; gap:20px; }
.field-group { display:flex; flex-direction:column; gap:6px; position: relative; }
label { font-size:.8rem; font-weight:700; color:var(--mid); }
input, textarea { font-family:var(--mono); font-size:16px; background:var(--paper); border:1.5px solid var(--border); border-radius:12px; padding:14px; width:100%; outline:none; }

.btn-main { background:var(--ink); color:var(--paper); border:none; border-radius:14px; padding:18px; font-weight:800; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:10px; width:100%; }
.ocr-btn { background: var(--accent); color: white; border: none; padding: 8px 15px; border-radius: 8px; font-size: 0.7rem; font-weight: 800; cursor: pointer; }

/* --- MODAL DE RECADRAGE --- */
#crop-modal { position: fixed; inset: 0; background: #000; z-index: 1000; display: none; flex-direction: column; }
.crop-container { flex: 1; position: relative; overflow: hidden; background: #000; }
.crop-controls { padding: 20px; background: var(--paper); display: flex; gap: 10px; }
#image-to-crop { max-width: 100%; display: block; }

/* --- LOADER --- */
#ocr-loader { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.7); color:white; z-index:2000; display:none; flex-direction:column; align-items:center; justify-content:center; }

.toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:var(--ink); color:white; padding:10px 20px; border-radius:50px; font-size:0.75rem; z-index:1000; opacity:0; transition:0.3s; pointer-events:none; }
.toast.show { opacity:1; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon"><span></span><span></span><span></span><span></span></div>
    <h1 style="font-size:0.9rem;">QRgen V1</h1>
  </div>
  <nav>
    <button class="tab active" onclick="location.reload()">Créer</button>
    <button class="tab">Galerie</button>
  </nav>
</header>

<div id="ocr-loader">
    <div style="font-weight: 800; font-size: 1.2rem; margin-bottom: 10px;">Lecture du texte...</div>
    <div id="ocr-perc">0%</div>
</div>

<!-- MODAL CROP -->
<div id="crop-modal">
    <div class="crop-container">
        <img id="image-to-crop">
    </div>
    <div class="crop-controls">
        <button class="btn-main" style="background: #ccc; color: #333;" onclick="closeCrop()">Annuler</button>
        <button class="btn-main" onclick="startOCR()">Analyser la sélection</button>
    </div>
</div>

<main class="view active">
  <div class="create-wrap">
    <h2 style="font-size:1.5rem; font-weight:800;">Nouveau QR</h2>
    
    <div class="field-group">
      <label>Nom</label>
      <input type="text" id="in-title" placeholder="Ex: Contact">
    </div>

    <div class="field-group">
      <div style="display:flex; justify-content: space-between; align-items: center;">
        <label>Texte à coder</label>
        <button class="ocr-btn" onclick="document.getElementById('file-input').click()">📷 Sélectionner Texte</button>
      </div>
      <input type="file" id="file-input" style="display:none" accept="image/*" onchange="openCropper(event)">
      <textarea id="in-text" rows="6" placeholder="Le texte apparaîtra ici..."></textarea>
    </div>

    <button class="btn-main" onclick="alert('QR généré (Simulé)')">Enregistrer</button>
  </div>
</main>

<div id="toast" class="toast"></div>

<script>
let cropper;
const cropModal = document.getElementById('crop-modal');
const imageToCrop = document.getElementById('image-to-crop');

// 1. Ouvrir l'image et lancer le recadreur
function openCropper(event) {
    const file = event.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = (e) => {
        imageToCrop.src = e.target.result;
        cropModal.style.display = 'flex';
        
        if (cropper) cropper.destroy();
        
        cropper = new Cropper(imageToCrop, {
            viewMode: 1,
            autoCropArea: 0.5,
            responsive: true,
            restore: false,
            checkOrientation: true
        });
    };
    reader.readAsDataURL(file);
}

// 2. Lancer l'OCR sur la partie coupée
async function startOCR() {
    if (!cropper) return;

    // On récupère le morceau d'image sélectionné
    const canvas = cropper.getCroppedCanvas();
    const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', 0.9));
    
    closeCrop();
    
    const loader = document.getElementById('ocr-loader');
    const perc = document.getElementById('ocr-perc');
    loader.style.display = 'flex';

    try {
        const result = await Tesseract.recognize(blob, 'fra', {
            logger: m => {
                if(m.status === 'recognizing text') {
                    perc.innerText = Math.round(m.progress * 100) + "%";
                }
            }
        });
        
        document.getElementById('in-text').value = result.data.text.trim();
        showToast("Texte extrait !");
    } catch (e) {
        showToast("Erreur d'analyse");
    } finally {
        loader.style.display = 'none';
        document.getElementById('file-input').value = "";
    }
}

function closeCrop() {
    cropModal.style.display = 'none';
    if(cropper) cropper.destroy();
}

function showToast(m) {
    const t = document.getElementById('toast');
    t.textContent = m; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
}
</script>
</body>
</html>
