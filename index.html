<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>QRgen Studio — Branche V1</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Bricolage+Grotesque:wght@400;600;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root {
  --bg: #f5f2eb;
  --paper: #fdfbf7;
  --ink: #1a1814;
  --mid: #8a8578;
  --accent: #d4621a;
  --border: #d8d3c8;
  --mono: 'DM Mono', monospace;
  --sans: 'Bricolage Grotesque', sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
body { background:var(--bg); color:var(--ink); font-family:var(--sans); min-height:100vh; display:flex; flex-direction:column; }

/* --- HEADER & NAV --- */
header {
  border-bottom:2px solid var(--ink); padding:0 20px;
  display:flex; align-items:stretch; justify-content:space-between;
  background:var(--paper); position:sticky; top:0; z-index:100; height:60px;
}
.logo { display:flex; align-items:center; gap:10px; }
.logo-icon { width:24px; height:24px; background:var(--ink); border-radius:4px; display:grid; grid-template-columns:1fr 1fr; gap:2px; padding:4px; }
.logo-icon span { background:var(--paper); border-radius:1px; }
.logo h1 { font-size:1rem; font-weight:800; letter-spacing:-.03em; }
.logo h1 em { font-style:normal; color:var(--accent); }

nav { display:flex; align-items:stretch; }
.tab { font-family:var(--mono); font-size:.75rem; padding:0 15px; border:none; border-bottom:3px solid transparent; background:transparent; color:var(--mid); cursor:pointer; transition:all .2s; display:flex; align-items:center; font-weight:600; }
.tab.active { color:var(--ink); border-bottom-color:var(--accent); }
.badge { background:var(--accent); color:white; border-radius:10px; padding:1px 6px; font-size:.6rem; margin-left:5px; }

/* --- VIEWS --- */
.view { display:none; animation: fadeIn 0.3s ease; }
.view.active { display:block; }
@keyframes fadeIn { from{opacity:0; transform:translateY(10px)} to{opacity:1; transform:translateY(0)} }

/* --- CREATE VIEW --- */
.create-wrap { max-width:500px; margin:0 auto; padding:40px 20px; display:flex; flex-direction:column; gap:25px; }
.create-heading { font-size:2rem; font-weight:800; letter-spacing:-.04em; line-height:1; }
.field-group { display:flex; flex-direction:column; gap:8px; }
label { font-size:.8rem; font-weight:700; color:var(--mid); }
input[type="text"], textarea { 
    font-family:var(--mono); font-size:1rem; background:var(--paper); 
    border:1.5px solid var(--border); border-radius:10px; padding:14px; width:100%; outline:none;
}
input[type="text"]:focus, textarea:focus { border-color:var(--ink); }
.btn-generate { 
    background:var(--ink); color:var(--paper); border:none; border-radius:12px; 
    padding:18px; font-weight:800; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:10px; transition: 0.2s;
}
.btn-generate:active { transform: scale(0.98); }

/* --- GALLERY CONTROLS --- */
.gallery-wrap { max-width:1000px; margin:0 auto; padding:20px; width:100%; }
.search-bar { position:relative; margin-bottom:20px; }
.search-bar input { padding-left:40px; height:45px; border-radius:12px; }
.search-bar svg { position:absolute; left:12px; top:13px; color:var(--mid); }

.tool-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; gap:10px; flex-wrap: wrap; }
.filter-group { display:flex; gap:8px; }
.f-btn { padding:6px 12px; border-radius:20px; border:1.5px solid var(--border); background:var(--paper); font-family:var(--mono); font-size:.7rem; cursor:pointer; }
.f-btn.active { background:var(--ink); color:white; border-color:var(--ink); }

.mode-toggle { display:flex; background:var(--border); padding:2px; border-radius:8px; }
.m-btn { border:none; background:none; padding:6px 10px; cursor:pointer; border-radius:6px; display:flex; }
.m-btn.active { background:var(--paper); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
.m-btn svg { width:16px; height:16px; }

/* --- STORAGE ZONE (NEW) --- */
.backup-zone { background: var(--paper); border: 1.5px solid var(--border); padding: 15px; border-radius: 15px; margin-bottom: 25px; display: flex; gap: 10px; }
.btn-small { flex: 1; padding: 10px; border-radius: 8px; font-size: 0.75rem; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; border: 1.5px solid var(--ink); background: white; }

/* --- DISPLAY MODES --- */
.gallery-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(160px, 1fr)); gap:15px; }
.qr-card { background:var(--paper); border:1.5px solid var(--border); border-radius:15px; padding:15px; display:flex; flex-direction:column; align-items:center; gap:10px; position:relative; cursor: pointer; }
.qr-card .fav-dot { position:absolute; top:10px; right:10px; border:none; background:none; cursor:pointer; font-size:1.2rem; }
.qr-thumb { width:100px; height:100px; }

.gallery-list { display:flex; flex-direction:column; gap:8px; }
.list-item { background:var(--paper); border:1.5px solid var(--border); border-radius:10px; padding:10px 15px; display:flex; align-items:center; gap:15px; cursor: pointer; }
.list-item img { width:40px; height:40px; border-radius:4px; }
.list-info { flex:1; min-width:0; }
.list-info h3 { font-size:0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* --- FOCUS CARD MODE --- */
.card-focus-wrap { display:none; flex-direction:column; align-items:center; gap:20px; padding:20px 0; }
.big-card { background:var(--paper); border:2px solid var(--ink); border-radius:24px; padding:40px 20px; width:100%; max-width:340px; display:flex; flex-direction:column; align-items:center; gap:20px; position:relative; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
.big-qr-box { padding:15px; background:white; border-radius:12px; }

/* --- UTILS --- */
.toast { position:fixed; bottom:30px; left:50%; transform:translateX(-50%); background:var(--ink); color:white; padding:10px 20px; border-radius:30px; font-size:0.8rem; z-index:1000; opacity:0; transition:0.3s; pointer-events:none; }
.toast.show { opacity:1; transform:translateX(-50%) translateY(-10px); }
.empty-state { text-align:center; padding:60px 20px; color:var(--mid); font-family:var(--mono); font-size:0.8rem; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon"><span></span><span></span><span></span><span></span></div>
    <h1>QR<em>gen</em> <small style="font-size: 0.6rem; opacity: 0.5;">V1</small></h1>
  </div>
  <nav>
    <button class="tab active" onclick="switchView('create')">Créer</button>
    <button class="tab" onclick="switchView('gallery')">Galerie <span class="badge" id="b-total">0</span></button>
  </nav>
</header>

<!-- VUE CREATION -->
<main id="view-create" class="view active">
  <div class="create-wrap">
    <div class="create-heading">Nouveau<br><span style="color:var(--accent)">QR Code</span></div>
    <div class="field-group">
      <label>Titre du QR</label>
      <input type="text" id="in-title" placeholder="ex: WiFi, Menu, GitHub..." maxlength="30">
    </div>
    <div class="field-group">
      <label>Lien ou Contenu</label>
      <textarea id="in-text" placeholder="Entrez votre texte ou URL..."></textarea>
    </div>
    <button class="btn-generate" onclick="createNew()">
      <span>Générer & Sauvegarder</span>
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </button>
  </div>
</main>

<!-- VUE GALERIE -->
<main id="view-gallery" class="view">
  <div class="gallery-wrap">
    
    <!-- Zone de Sauvegarde Manuelle -->
    <div class="backup-zone">
        <button class="btn-small" onclick="exportData()">💾 Sauvegarder Base (.json)</button>
        <label class="btn-small" style="background:transparent; border-color:var(--border); color:var(--mid);">
            📂 Restaurer
            <input type="file" style="display:none" accept=".json" onchange="importData(event)">
        </label>
    </div>

    <div class="search-bar">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="q-search" placeholder="Rechercher..." oninput="render()">
    </div>

    <div class="tool-row">
      <div class="filter-group">
        <button class="f-btn active" id="f-all" onclick="setFilter('all')">Tous</button>
        <button class="f-btn" id="f-fav" onclick="setFilter('fav')">★ Favoris</button>
      </div>
      <div class="mode-toggle">
        <button class="m-btn active" id="m-grid" onclick="setMode('grid')"><svg viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg></button>
        <button class="m-btn" id="m-list" onclick="setMode('list')"><svg viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="4" width="18" height="3"/><rect x="3" y="10" width="18" height="3"/><rect x="3" y="16" width="18" height="3"/></svg></button>
        <button class="m-btn" id="m-card" onclick="setMode('card')"><svg viewBox="0 0 24 24" fill="currentColor"><rect x="5" y="2" width="14" height="20" rx="2"/></svg></button>
      </div>
    </div>

    <div id="display-grid" class="gallery-grid"></div>
    <div id="display-list" class="gallery-list" style="display:none"></div>
    
    <!-- Mode Carte Individuelle -->
    <div id="display-card" class="card-focus-wrap">
        <div style="display:flex; gap:20px; align-items:center; margin-bottom:10px;">
            <button class="f-btn" onclick="navCard(-1)">← Précédent</button>
            <span id="card-index" style="font-family:var(--mono); font-size:0.8rem">0 / 0</span>
            <button class="f-btn" onclick="navCard(1)">Suivant →</button>
        </div>
        <div class="big-card" id="touch-zone">
            <button class="fav-dot" id="card-fav-btn" style="top:20px; right:20px; font-size:1.5rem">☆</button>
            <h2 id="card-title">Titre</h2>
            <div class="big-qr-box" id="card-qr"></div>
            <p id="card-text" style="font-family:var(--mono); font-size:0.7rem; color:var(--mid); word-break:break-all; text-align:center"></p>
            <div style="display:flex; gap:10px; width:100%">
                <button class="btn-small" style="flex:1" id="card-dl">Télécharger</button>
                <button class="btn-small" style="flex:1; border-color:red; color:red" id="card-del">Supprimer</button>
            </div>
        </div>
    </div>

    <div id="empty-msg" class="empty-state" style="display:none">Aucun QR code trouvé.</div>
  </div>
</main>

<div id="toast" class="toast">Action effectuée</div>

<script>
let items = JSON.parse(localStorage.getItem('qr_items') || '[]');
let currentFilter = 'all';
let currentMode = 'grid';
let cardIdx = 0;

function save() {
    localStorage.setItem('qr_items', JSON.stringify(items));
    document.getElementById('b-total').textContent = items.length;
}

function switchView(v) {
    document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
    document.getElementById('view-' + v).classList.add('active');
    if(event) event.currentTarget.classList.add('active');
    if(v === 'gallery') render();
}

function createNew() {
    const t = document.getElementById('in-title').value.trim();
    const txt = document.getElementById('in-text').value.trim();
    if(!t || !txt) return showToast("Champs vides !");

    const tempDiv = document.createElement('div');
    new QRCode(tempDiv, { text: txt, width: 256, height: 256 });

    setTimeout(() => {
        const imgData = tempDiv.querySelector('canvas').toDataURL("image/png");
        items.unshift({ id: Date.now(), title: t, text: txt, img: imgData, fav: false });
        save();
        document.getElementById('in-title').value = '';
        document.getElementById('in-text').value = '';
        showToast("QR Code créé !");
        switchView('gallery');
    }, 100);
}

function render() {
    const query = document.getElementById('q-search').value.toLowerCase();
    let filtered = items.filter(i => {
        const mS = i.title.toLowerCase().includes(query);
        const mF = currentFilter === 'all' || i.fav;
        return mS && mF;
    });

    document.getElementById('display-grid').style.display = currentMode === 'grid' ? 'grid' : 'none';
    document.getElementById('display-list').style.display = currentMode === 'list' ? 'flex' : 'none';
    document.getElementById('display-card').style.display = currentMode === 'card' ? 'flex' : 'none';
    document.getElementById('empty-msg').style.display = filtered.length === 0 ? 'block' : 'none';

    if(currentMode === 'grid') renderGrid(filtered);
    if(currentMode === 'list') renderList(filtered);
    if(currentMode === 'card') renderCard(filtered);
}

function renderGrid(list) {
    const cont = document.getElementById('display-grid');
    cont.innerHTML = '';
    list.forEach(item => {
        const div = document.createElement('div');
        div.className = 'qr-card';
        div.onclick = () => { cardIdx = items.findIndex(i => i.id === item.id); setMode('card'); };
        div.innerHTML = `
            <button class="fav-dot" onclick="event.stopPropagation(); toggleFav(${item.id})">${item.fav?'★':'☆'}</button>
            <img class="qr-thumb" src="${item.img}">
            <h3 style="font-size:0.8rem">${item.title}</h3>
        `;
        cont.appendChild(div);
    });
}

function renderList(list) {
    const cont = document.getElementById('display-list');
    cont.innerHTML = '';
    list.forEach(item => {
        const div = document.createElement('div');
        div.className = 'list-item';
        div.onclick = () => { cardIdx = items.findIndex(i => i.id === item.id); setMode('card'); };
        div.innerHTML = `
            <img src="${item.img}">
            <div class="list-info"><h3>${item.title}</h3></div>
            <button class="fav-dot" onclick="event.stopPropagation(); toggleFav(${item.id})">${item.fav?'★':'☆'}</button>
        `;
        cont.appendChild(div);
    });
}

function renderCard(list) {
    if(list.length === 0) return;
    if(cardIdx >= list.length) cardIdx = 0;
    const item = list[cardIdx];
    document.getElementById('card-title').textContent = item.title;
    document.getElementById('card-text').textContent = item.text;
    document.getElementById('card-qr').innerHTML = `<img src="${item.img}" style="width:200px">`;
    document.getElementById('card-index').textContent = `${cardIdx + 1} / ${list.length}`;
    document.getElementById('card-fav-btn').textContent = item.fav ? '★' : '☆';
    document.getElementById('card-fav-btn').onclick = () => toggleFav(item.id);
    document.getElementById('card-del').onclick = () => deleteItem(item.id);
    document.getElementById('card-dl').onclick = () => {
        const a = document.createElement('a'); a.href = item.img; a.download = `${item.title}.png`; a.click();
    };
}

function navCard(dir) {
    cardIdx = (cardIdx + dir + items.length) % items.length;
    render();
}

function setFilter(f) {
    currentFilter = f;
    document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('f-' + f).classList.add('active');
    render();
}

function setMode(m) {
    currentMode = m;
    document.querySelectorAll('.m-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('m-' + m).classList.add('active');
    render();
}

function toggleFav(id) {
    const idx = items.findIndex(i => i.id === id);
    items[idx].fav = !items[idx].fav;
    save(); render();
}

function deleteItem(id) {
    if(!confirm("Supprimer ce QR ?")) return;
    items = items.filter(i => i.id !== id);
    save(); render();
    showToast("Supprimé");
}

/* --- LOGIQUE EXPORT / IMPORT --- */
function exportData() {
    if (items.length === 0) return showToast("Rien à sauvegarder");
    const data = JSON.stringify(items, null, 2);
    const blob = new Blob([data], {type: 'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'QRgen_database.json';
    a.click();
    showToast("Fichier JSON téléchargé");
}

function importData(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            const imported = JSON.parse(e.target.result);
            if (Array.isArray(imported)) {
                if(confirm(`Importer ${imported.length} codes ?`)) {
                    items = imported;
                    save(); render();
                    showToast("Base restaurée !");
                }
            }
        } catch(err) { showToast("Erreur de fichier"); }
    };
    reader.readAsText(file);
}

function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
}

// Initialisation
document.getElementById('b-total').textContent = items.length;
</script>

</body>
</html>
