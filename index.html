<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>QR PRO</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Bricolage+Grotesque:wght@400;600;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

<style>
:root {
  --bg: #f0ede6; --paper: #fdfbf7; --ink: #1a1814; --mid: #8a8578;
  --accent: #d4621a; --border: #d8d3c8; --mono: 'DM Mono', monospace; --sans: 'Bricolage Grotesque', sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
body { background:var(--bg); color:var(--ink); font-family:var(--sans); min-height:100vh; display:flex; flex-direction:column; overflow-x: hidden; }

header { border-bottom:2px solid var(--ink); padding:0 15px; display:flex; align-items:stretch; justify-content:space-between; background:var(--paper); position:sticky; top:0; z-index:100; height:60px; }
.logo { display:flex; align-items:center; gap:8px; }
.logo-icon { width:22px; height:22px; background:var(--ink); border-radius:4px; display:grid; grid-template-columns:1fr 1fr; gap:2px; padding:4px; }
.logo-icon span { background:var(--paper); border-radius:1px; }
nav { display:flex; }
.tab { font-family:var(--mono); font-size:.75rem; padding:0 15px; border:none; border-bottom:3px solid transparent; background:transparent; color:var(--mid); cursor:pointer; font-weight:600; }
.tab.active { color:var(--ink); border-bottom-color:var(--accent); }
.badge { background:var(--accent); color:white; border-radius:10px; padding:1px 6px; font-size:.6rem; margin-left:4px; }

.view { display:none; animation: fadeIn 0.2s ease; }
.view.active { display:block; }
@keyframes fadeIn { from{opacity:0; transform:translateY(5px)} to{opacity:1; transform:translateY(0)} }

.create-wrap { max-width:500px; margin:0 auto; padding:30px 20px; display:flex; flex-direction:column; gap:20px; }
.field-group { display:flex; flex-direction:column; gap:6px; position: relative; }
label { font-size:.8rem; font-weight:700; color:var(--mid); }
input, textarea { font-family:var(--mono); font-size:16px; background:var(--paper); border:1.5px solid var(--border); border-radius:12px; padding:14px; width:100%; outline:none; transition: border-color 0.2s; }
input:focus, textarea:focus { border-color: var(--accent); }

.btn-main { background:var(--ink); color:var(--paper); border:none; border-radius:14px; padding:18px; font-weight:800; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:10px; font-family: var(--sans); font-size: 1rem; transition: opacity 0.2s; }
.btn-main:active { opacity: 0.8; }
.ocr-trigger { background: var(--accent); color: white; border: none; padding: 6px 12px; border-radius: 8px; font-size: 0.65rem; font-weight: 800; cursor: pointer; align-self: flex-end; margin-bottom: -5px; font-family: var(--sans); }

/* OCR Progress amélioré */
#ocr-loader { position: fixed; inset: 0; background: rgba(0,0,0,0.88); z-index: 2000; display: none; flex-direction: column; align-items: center; justify-content: center; color: white; gap: 16px; }
#ocr-steps { display: flex; flex-direction: column; gap: 8px; width: 260px; }
.ocr-step { font-size: 0.75rem; font-family: var(--mono); color: #aaa; display: flex; align-items: center; gap: 8px; transition: color 0.3s; }
.ocr-step.active { color: white; }
.ocr-step.done { color: #6fcf97; }
.ocr-step-dot { width: 8px; height: 8px; border-radius: 50%; background: #555; flex-shrink: 0; transition: background 0.3s; }
.ocr-step.active .ocr-step-dot { background: var(--accent); animation: pulse 1s infinite; }
.ocr-step.done .ocr-step-dot { background: #6fcf97; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.ocr-bar-wrap { width: 260px; height: 4px; background: #333; border-radius: 2px; overflow: hidden; }
.ocr-bar { height: 100%; width: 0%; background: var(--accent); border-radius: 2px; transition: width 0.3s; }

/* Modal crop */
#crop-modal { position: fixed; inset: 0; background: #000; z-index: 1000; display: none; flex-direction: column; }
.crop-container { flex: 1; position: relative; overflow: hidden; }
.crop-controls { padding: 20px; background: var(--paper); display: flex; gap: 10px; }

/* Galerie */
.gallery-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(140px, 1fr)); gap:12px; padding:15px; }
.qr-card { background:var(--paper); border:1.5px solid var(--border); border-radius:14px; padding:10px; position:relative; text-align:center; cursor: pointer; transition: border-color 0.2s, transform 0.15s; }
.qr-card:hover { border-color: var(--ink); transform: translateY(-2px); }
.qr-card img { width:100%; border-radius:6px; margin-bottom:8px; }
.del-btn { position: absolute; top: 6px; right: 6px; background: var(--ink); border: none; border-radius: 50%; width: 22px; height: 22px; color: white; font-size: 0.7rem; cursor: pointer; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.2s; }
.qr-card:hover .del-btn { opacity: 1; }

/* Stockage warning */
.storage-bar-wrap { margin: 0 15px 10px; background: var(--paper); border: 1.5px solid var(--border); border-radius: 10px; padding: 10px 14px; display: flex; align-items: center; gap: 10px; }
.storage-bar { flex: 1; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
.storage-fill { height: 100%; border-radius: 2px; background: var(--accent); transition: width 0.4s; }
.storage-label { font-family: var(--mono); font-size: 0.65rem; color: var(--mid); white-space: nowrap; }

/* Favoris */
.fav-btn { position: absolute; top: 6px; left: 8px; background: none; border: none; font-size: 1rem; cursor: pointer; opacity: 0; transition: opacity 0.2s; line-height: 1; padding: 0; }
.qr-card:hover .fav-btn { opacity: 1; }
.qr-card.is-fav .fav-btn { opacity: 1; }

/* Galerie toolbar */
.gallery-toolbar { padding: 10px 15px 0; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.search-input { font-family: var(--mono); font-size: 0.8rem; background: var(--paper); border: 1.5px solid var(--border); border-radius: 10px; padding: 8px 12px; flex: 1; min-width: 120px; outline: none; transition: border-color 0.2s; }
.search-input:focus { border-color: var(--accent); }
.filter-btn { font-family: var(--mono); font-size: 0.7rem; font-weight: 700; padding: 8px 12px; border-radius: 10px; border: 1.5px solid var(--border); background: var(--paper); color: var(--mid); cursor: pointer; transition: all 0.2s; white-space: nowrap; }
.filter-btn.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }

/* Navigation focus — boutons latéraux */
.focus-nav-side { position: absolute; top: 50%; transform: translateY(-50%); z-index: 10; }
.focus-nav-left { left: 16px; }
.focus-nav-right { right: 16px; }
.nav-btn { background: var(--paper); border: 2px solid var(--ink); border-radius: 50%; width: 56px; height: 56px; font-size: 1.5rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; box-shadow: 0 4px 14px rgba(0,0,0,0.12); }
.nav-btn:hover { background: var(--ink); color: var(--paper); }
.nav-btn:disabled { opacity: 0.2; cursor: default; box-shadow: none; }
.focus-top-bar { display: flex; align-items: center; justify-content: center; gap: 12px; width: 100%; }
.nav-counter { font-family: var(--mono); font-size: 0.75rem; color: var(--mid); }
.focus-fav-btn { background: none; border: 1.5px solid var(--border); border-radius: 50%; width: 36px; height: 36px; font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
.focus-fav-btn:hover { border-color: var(--accent); }

/* Focus overlay */
.focus-overlay { position: fixed; inset:0; background: rgba(245, 242, 235, 0.98); backdrop-filter: blur(8px); z-index: 200; display: none; flex-direction: column; align-items:center; justify-content: center; padding: 20px; }
.focus-card { background: var(--paper); border: 2px solid var(--ink); border-radius: 24px; padding: 30px 15px; width: 100%; max-width: 340px; display: flex; flex-direction: column; align-items: center; gap: 20px; position: relative; }
.focus-actions { display: flex; gap: 10px; width: 100%; }

#temp-qr { position: absolute; left: -9999px; }
.toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:var(--ink); color:white; padding:10px 20px; border-radius:50px; font-size:0.75rem; z-index:3000; opacity:0; transition:0.3s; pointer-events:none; white-space: nowrap; }
.toast.show { opacity:1; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon"><span></span><span></span><span></span><span></span></div>
    <h1>QR PRO</h1>
  </div>
  <nav>
    <button class="tab active" onclick="switchView('create', this)">Créer</button>
    <button class="tab" onclick="switchView('gallery', this)">Galerie <span class="badge" id="b-total">0</span></button>
  </nav>
</header>

<!-- OCR Loader amélioré -->
<div id="ocr-loader">
  <div style="font-size:1.1rem; font-weight:800; margin-bottom:4px;">Analyse en cours…</div>
  <div id="ocr-steps">
    <div class="ocr-step" id="step-pre"><span class="ocr-step-dot"></span>Prétraitement de l'image</div>
    <div class="ocr-step" id="step-ocr"><span class="ocr-step-dot"></span>Reconnaissance de texte</div>
    <div class="ocr-step" id="step-clean"><span class="ocr-step-dot"></span>Nettoyage du résultat</div>
  </div>
  <div class="ocr-bar-wrap"><div class="ocr-bar" id="ocr-bar"></div></div>
  <div id="ocr-perc" style="font-family:var(--mono); font-size:0.8rem; color:#aaa;">0%</div>
</div>

<!-- Modal recadrage -->
<div id="crop-modal">
  <div class="crop-container"><img id="image-to-crop"></div>
  <div class="crop-controls">
    <button onclick="closeCrop()" style="flex:1; padding:15px; border-radius:10px; border:none; background:#eee; font-family:var(--sans); font-weight:700;">Annuler</button>
    <button class="btn-main" style="flex:2" onclick="processAndOCR()">Analyser la zone</button>
  </div>
</div>

<div id="temp-qr"></div>

<!-- Vue Créer -->
<main id="view-create" class="view active">
  <div class="create-wrap">
    <h2 style="font-size:1.8rem; font-weight:800;">Nouveau QR</h2>
    <div class="field-group">
      <label>Nom</label>
      <input type="text" id="in-title" placeholder="Ex: WiFi maison">
    </div>
    <div class="field-group">
      <div style="display:flex; justify-content:space-between; align-items:flex-end;">
        <label>Contenu</label>
        <button class="ocr-trigger" onclick="document.getElementById('ocr-input').click()">📷 Scanner Texte</button>
      </div>
      <input type="file" id="ocr-input" style="display:none" accept="image/*" onchange="openCropper(event)">
      <textarea id="in-text" rows="5" placeholder="Saisir un lien, du texte, un identifiant…"></textarea>
    </div>
    <button class="btn-main" onclick="createNew()">
      <span>Générer et Enregistrer</span>
    </button>
  </div>
</main>

<!-- Vue Galerie -->
<main id="view-gallery" class="view">
  <div class="storage-bar-wrap">
    <span class="storage-label">Stockage</span>
    <div class="storage-bar"><div class="storage-fill" id="storage-fill"></div></div>
    <span class="storage-label" id="storage-label">0%</span>
  </div>
  <div class="gallery-toolbar">
    <input class="search-input" type="text" id="search-input" placeholder="🔍 Rechercher par titre…" oninput="render()">
    <button class="filter-btn active" id="filter-all" onclick="setFilter('all', this)">Tous</button>
    <button class="filter-btn" id="filter-fav" onclick="setFilter('fav', this)">⭐ Favoris</button>
  </div>
  <div id="display-grid" class="gallery-grid"></div>
</main>

<!-- Focus / détail -->
<div id="focus-mode" class="focus-overlay">
  <!-- Boutons latéraux -->
  <button class="nav-btn focus-nav-side focus-nav-left" id="nav-prev" onclick="navigateFocus(-1)">←</button>
  <button class="nav-btn focus-nav-side focus-nav-right" id="nav-next" onclick="navigateFocus(1)">→</button>

  <div class="focus-card">
    <div class="focus-top-bar">
      <span class="nav-counter" id="nav-counter">1 / 1</span>
      <button class="focus-fav-btn" id="focus-fav-btn" onclick="toggleFocusFav()" title="Favori">☆</button>
    </div>
    <h2 id="focus-title" style="font-size:1.3rem; font-weight:800; text-align:center;"></h2>
    <div id="focus-qr-display" style="background:white; padding:10px; border-radius:10px;"></div>
    <div class="focus-actions">
      <button class="btn-main" style="flex:1; padding:14px;" onclick="downloadFocus()">⬇ Télécharger</button>
      <button class="btn-main" style="flex:1; padding:14px; background:var(--mid);" onclick="closeFocus()">Fermer</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
// ─── État global ───────────────────────────────────────────────────────────
let items = JSON.parse(localStorage.getItem('qr_items_v1') || '[]');
let cropper;
let focusImgSrc = '';
let focusIdx = 0;
let currentFilter = 'all';
const STORAGE_LIMIT_KB = 3500;

// ─── Navigation ────────────────────────────────────────────────────────────
function switchView(v, btn) {
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
  document.getElementById('view-' + v).classList.add('active');
  btn.classList.add('active');
  if (v === 'gallery') render();
}

// ─── Filtre galerie ─────────────────────────────────────────────────────────
function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function getFilteredItems() {
  const query = (document.getElementById('search-input')?.value || '').toLowerCase().trim();
  return items
    .map((item, idx) => ({ item, idx }))
    .filter(({ item }) => {
      const matchFilter = currentFilter === 'fav' ? item.fav : true;
      const matchSearch = query ? item.title.toLowerCase().includes(query) : true;
      return matchFilter && matchSearch;
    });
}

// ─── OCR : ouverture du recadrage ──────────────────────────────────────────
function openCropper(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    const img = document.getElementById('image-to-crop');
    img.src = e.target.result;
    document.getElementById('crop-modal').style.display = 'flex';
    if (cropper) cropper.destroy();
    cropper = new Cropper(img, { viewMode: 1 });
  };
  reader.readAsDataURL(file);
}

// ─── OCR : prétraitement avancé + reconnaissance ───────────────────────────
async function processAndOCR() {
  if (!cropper) return;
  const loader = document.getElementById('ocr-loader');
  loader.style.display = 'flex';
  setOCRStep('pre');

  try {
    // ── Étape 1 : Récupération + redimensionnement ──────────────────────────
    const rawCanvas = cropper.getCroppedCanvas({ maxWidth: 2000, maxHeight: 2000 });

    // ── Étape 2 : Pipeline de prétraitement sur canvas offscreen ──────────
    const oc = document.createElement('canvas');
    oc.width = rawCanvas.width;
    oc.height = rawCanvas.height;
    const ctx = oc.getContext('2d');
    ctx.drawImage(rawCanvas, 0, 0);

    const imageData = ctx.getImageData(0, 0, oc.width, oc.height);
    const d = imageData.data;

    // Calcul de la luminosité moyenne pour seuil adaptatif
    let total = 0;
    for (let i = 0; i < d.length; i += 4) {
      total += 0.299 * d[i] + 0.587 * d[i+1] + 0.114 * d[i+2];
    }
    const avgLum = total / (d.length / 4);
    const threshold = avgLum * 0.85; // seuil adaptatif selon l'image

    for (let i = 0; i < d.length; i += 4) {
      // Luminosité pondérée (perception humaine)
      const lum = 0.299 * d[i] + 0.587 * d[i+1] + 0.114 * d[i+2];
      const val = lum > threshold ? 255 : 0;
      d[i] = d[i+1] = d[i+2] = val;
      d[i+3] = 255;
    }
    ctx.putImageData(imageData, 0, 0);

    // ── Étape 3 : Upscale x2 pour améliorer la précision OCR ──────────────
    const scaled = document.createElement('canvas');
    scaled.width = oc.width * 2;
    scaled.height = oc.height * 2;
    const sCtx = scaled.getContext('2d');
    sCtx.imageSmoothingEnabled = false;
    sCtx.drawImage(oc, 0, 0, scaled.width, scaled.height);

    const blob = await new Promise(res => scaled.toBlob(res, 'image/png'));
    closeCrop();
    setOCRStep('ocr');

    // ── Étape 4 : Reconnaissance Tesseract ─────────────────────────────────
    const result = await Tesseract.recognize(blob, 'fra+eng', {
      logger: m => {
        if (m.status === 'recognizing text') {
          const pct = Math.round(m.progress * 100);
          document.getElementById('ocr-perc').innerText = pct + '%';
          document.getElementById('ocr-bar').style.width = pct + '%';
        }
      }
    });

    setOCRStep('clean');
    await sleep(300);

    // ── Étape 5 : Nettoyage du texte extrait ──────────────────────────────
    const raw = result.data.text || '';
    const cleaned = raw
      .replace(/[^\S\n]+/g, ' ')          // espaces multiples → 1
      .replace(/\n{3,}/g, '\n\n')         // sauts de ligne excessifs
      .replace(/[^\x20-\x7E\xC0-\xFF\n]/g, '') // supprime caractères parasites
      .trim();

    document.getElementById('in-text').value = cleaned || '';
    showToast(cleaned ? '✓ Texte extrait !' : '⚠ Aucun texte détecté');

  } catch (e) {
    console.error(e);
    showToast('Erreur lors de l\'analyse');
  }

  loader.style.display = 'none';
  resetOCRSteps();
}

function setOCRStep(stepId) {
  const steps = { pre: 'step-pre', ocr: 'step-ocr', clean: 'step-clean' };
  const order = ['pre', 'ocr', 'clean'];
  const idx = order.indexOf(stepId);
  order.forEach((s, i) => {
    const el = document.getElementById(steps[s]);
    el.classList.remove('active', 'done');
    if (i < idx) el.classList.add('done');
    else if (i === idx) el.classList.add('active');
  });
}

function resetOCRSteps() {
  ['step-pre','step-ocr','step-clean'].forEach(id => {
    document.getElementById(id).classList.remove('active','done');
  });
  document.getElementById('ocr-bar').style.width = '0%';
  document.getElementById('ocr-perc').innerText = '0%';
}

function closeCrop() {
  document.getElementById('crop-modal').style.display = 'none';
  if (cropper) cropper.destroy();
  document.getElementById('ocr-input').value = '';
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ─── Création QR ────────────────────────────────────────────────────────────
function createNew() {
  const t = document.getElementById('in-title').value.trim();
  const txt = document.getElementById('in-text').value.trim();
  if (!t || !txt) return showToast('Remplis les deux champs');

  // Vérification stockage avant génération
  const usedKB = getStorageUsageKB();
  if (usedKB > STORAGE_LIMIT_KB) {
    return showToast('⚠ Stockage plein — supprime des QR codes');
  }

  const tempArea = document.getElementById('temp-qr');
  tempArea.innerHTML = '';

  // On génère le QR dans un canvas (plus fiable que img.src)
  new QRCode(tempArea, { text: txt, width: 300, height: 300, correctLevel: QRCode.CorrectLevel.H });

  // On attend que le canvas soit dessiné (via requestAnimationFrame + vérification)
  waitForQRCanvas(tempArea, (finalImg) => {
    items.unshift({ id: Date.now(), title: t, img: finalImg, text: txt });
    saveItems();
    updateCount();

    // Reset du formulaire
    document.getElementById('in-title').value = '';
    document.getElementById('in-text').value = '';

    showToast('✓ QR Code créé !');
  });
}

// Attend que le canvas soit disponible (remplace le setTimeout fragile)
function waitForQRCanvas(container, callback, attempts = 0) {
  if (attempts > 20) return showToast('Erreur de génération');
  const canvas = container.querySelector('canvas');
  if (canvas && canvas.width > 0) {
    callback(canvas.toDataURL('image/png'));
  } else {
    requestAnimationFrame(() => waitForQRCanvas(container, callback, attempts + 1));
  }
}

// ─── Sauvegarde ─────────────────────────────────────────────────────────────
function saveItems() {
  try {
    localStorage.setItem('qr_items_v1', JSON.stringify(items));
  } catch(e) {
    showToast('⚠ Stockage insuffisant');
  }
}

function getStorageUsageKB() {
  try {
    const raw = localStorage.getItem('qr_items_v1') || '';
    return Math.round((raw.length * 2) / 1024); // UTF-16 → octets → Ko
  } catch { return 0; }
}

// ─── Galerie ────────────────────────────────────────────────────────────────
function render() {
  const grid = document.getElementById('display-grid');
  const filtered = getFilteredItems();

  if (filtered.length === 0) {
    const msg = currentFilter === 'fav' ? 'Aucun favori pour l\'instant ⭐' : 'Aucun QR code trouvé';
    grid.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:40px 20px; color:var(--mid); font-size:0.85rem; font-family:var(--mono);">${msg}</div>`;
    updateStorageBar();
    return;
  }

  grid.innerHTML = filtered.map(({ item, idx }) => {
    const safeTitle = escapeAttr(item.title);
    const favStar = item.fav ? '⭐' : '☆';
    const favClass = item.fav ? 'is-fav' : '';
    return `
      <div class="qr-card ${favClass}" onclick="openFocus(${idx})">
        <button class="fav-btn" onclick="toggleFav(event, ${idx})" title="Favori">${favStar}</button>
        <button class="del-btn" onclick="deleteItem(event, ${idx})" title="Supprimer">✕</button>
        <img src="${item.img}" alt="QR ${safeTitle}">
        <p style="font-size:0.7rem; font-weight:800; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${escapeHtml(item.title)}</p>
      </div>
    `;
  }).join('');
  updateStorageBar();
}

function toggleFav(event, idx) {
  event.stopPropagation();
  items[idx].fav = !items[idx].fav;
  saveItems();
  render();
  showToast(items[idx].fav ? '⭐ Ajouté aux favoris' : 'Retiré des favoris');
}

function deleteItem(event, idx) {
  event.stopPropagation(); // ne pas ouvrir le focus
  if (!confirm(`Supprimer "${items[idx].title}" ?`)) return;
  items.splice(idx, 1);
  saveItems();
  updateCount();
  render();
  showToast('QR supprimé');
}

function updateStorageBar() {
  const usedKB = getStorageUsageKB();
  const pct = Math.min(100, Math.round((usedKB / STORAGE_LIMIT_KB) * 100));
  document.getElementById('storage-fill').style.width = pct + '%';
  document.getElementById('storage-fill').style.background = pct > 80 ? '#e53e3e' : 'var(--accent)';
  document.getElementById('storage-label').innerText = `${usedKB} Ko / ${STORAGE_LIMIT_KB} Ko`;
}

// ─── Focus ──────────────────────────────────────────────────────────────────
function openFocus(idx) {
  const item = items[idx];
  if (!item) return;
  focusIdx = idx;
  renderFocus();
  document.getElementById('focus-mode').style.display = 'flex';
}

function renderFocus() {
  const filtered = getFilteredItems();
  const posInFiltered = filtered.findIndex(f => f.idx === focusIdx);
  const item = items[focusIdx];
  if (!item) return;

  focusImgSrc = item.img;
  document.getElementById('focus-title').innerText = item.title;
  document.getElementById('focus-qr-display').innerHTML = `<img src="${item.img}" style="width:200px; display:block;">`;

  // Compteur
  const total = filtered.length || items.length;
  const pos = posInFiltered >= 0 ? posInFiltered + 1 : '?';
  document.getElementById('nav-counter').innerText = `${pos} / ${total}`;

  // Boutons nav
  const hasPrev = posInFiltered > 0;
  const hasNext = posInFiltered < filtered.length - 1;
  document.getElementById('nav-prev').disabled = !hasPrev;
  document.getElementById('nav-next').disabled = !hasNext;

  // Favori
  document.getElementById('focus-fav-btn').innerText = item.fav ? '⭐' : '☆';
}

function navigateFocus(dir) {
  const filtered = getFilteredItems();
  const posInFiltered = filtered.findIndex(f => f.idx === focusIdx);
  const newPos = posInFiltered + dir;
  if (newPos < 0 || newPos >= filtered.length) return;
  focusIdx = filtered[newPos].idx;
  renderFocus();
}

function toggleFocusFav() {
  items[focusIdx].fav = !items[focusIdx].fav;
  saveItems();
  renderFocus();
  render();
  showToast(items[focusIdx].fav ? '⭐ Ajouté aux favoris' : 'Retiré des favoris');
}

function closeFocus() { document.getElementById('focus-mode').style.display = 'none'; }

function downloadFocus() {
  if (!focusImgSrc) return;
  const a = document.createElement('a');
  a.href = focusImgSrc;
  a.download = 'qrcode.png';
  a.click();
  showToast('Téléchargement lancé');
}

// ─── Utilitaires ────────────────────────────────────────────────────────────
// Protection XSS : encode les caractères dangereux dans le HTML
function escapeHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function escapeAttr(str) {
  return String(str).replace(/'/g, "\\'").replace(/"/g, '&quot;');
}

function updateCount() {
  document.getElementById('b-total').innerText = items.length;
}

function showToast(m) {
  const t = document.getElementById('toast');
  t.innerText = m;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ─── Init ───────────────────────────────────────────────────────────────────
updateCount();
</script>
</body>
