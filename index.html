<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>QRgen Studio Ultra</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Bricolage+Grotesque:wght@400;600;800&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

<style>
:root {
  --bg: #f0ede6; --paper: #fdfbf7; --ink: #1a1814; --mid: #8a8578;
  --accent: #d4621a; --border: #d8d3c8; --mono: 'DM Mono', monospace; --sans: 'Bricolage Grotesque', sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
body { background:var(--bg); color:var(--ink); font-family:var(--sans); min-height:100vh; display:flex; flex-direction:column; overflow-x: hidden; }

header { border-bottom:2px solid var(--ink); padding:0 15px; display:flex; align-items:stretch; justify-content:space-between; background:var(--paper); position:sticky; top:0; z-index:100; height:60px; }
.logo { display:flex; align-items:center; gap:8px; }
.logo-icon { width:22px; height:22px; background:var(--ink); border-radius:4px; display:grid; grid-template-columns:1fr 1fr; gap:2px; padding:4px; }
.logo-icon span { background:var(--paper); border-radius:1px; }
nav { display:flex; }
.tab { font-family:var(--mono); font-size:.75rem; padding:0 15px; border:none; border-bottom:3px solid transparent; background:transparent; color:var(--mid); cursor:pointer; font-weight:600; }
.tab.active { color:var(--ink); border-bottom-color:var(--accent); }
.badge { background:var(--accent); color:white; border-radius:10px; padding:1px 6px; font-size:.6rem; margin-left:4px; }

.view { display:none; animation: fadeIn 0.2s ease; }
.view.active { display:block; }
@keyframes fadeIn { from{opacity:0; transform:translateY(5px)} to{opacity:1; transform:translateY(0)} }

.create-wrap { max-width:500px; margin:0 auto; padding:30px 20px; display:flex; flex-direction:column; gap:20px; }
.field-group { display:flex; flex-direction:column; gap:6px; position: relative; }
label { font-size:.8rem; font-weight:700; color:var(--mid); }
input, textarea { font-family:var(--mono); font-size:16px; background:var(--paper); border:1.5px solid var(--border); border-radius:12px; padding:14px; width:100%; outline:none; }

.btn-main { background:var(--ink); color:var(--paper); border:none; border-radius:14px; padding:18px; font-weight:800; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:10px; }
.ocr-trigger { background: var(--accent); color: white; border: none; padding: 6px 12px; border-radius: 8px; font-size: 0.65rem; font-weight: 800; cursor: pointer; align-self: flex-end; margin-bottom: -5px; }

#crop-modal { position: fixed; inset: 0; background: #000; z-index: 1000; display: none; flex-direction: column; }
.crop-container { flex: 1; position: relative; overflow: hidden; }
.crop-controls { padding: 20px; background: var(--paper); display: flex; gap: 10px; }

.gallery-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(140px, 1fr)); gap:12px; padding:15px; }
.qr-card { background:var(--paper); border:1.5px solid var(--border); border-radius:14px; padding:10px; position:relative; text-align:center; }
.qr-card img { width:100%; border-radius:6px; margin-bottom:8px; }
.fav-btn { position: absolute; top: 8px; right: 8px; background: none; border: none; font-size: 1.2rem; color: var(--accent); }

.focus-overlay { position: fixed; inset:0; background: rgba(245, 242, 235, 0.98); backdrop-filter: blur(8px); z-index: 200; display: none; flex-direction: column; align-items:center; justify-content: center; padding: 20px; }
.focus-card { background: var(--paper); border: 2px solid var(--ink); border-radius: 24px; padding: 40px 15px; width: 100%; max-width: 400px; display: flex; flex-direction: column; align-items: center; gap: 20px; position: relative; }

#ocr-loader { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 2000; display: none; flex-direction: column; align-items: center; justify-content: center; color: white; }
#temp-qr { position: absolute; left: -9999px; }
.toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:var(--ink); color:white; padding:10px 20px; border-radius:50px; font-size:0.75rem; z-index:1000; opacity:0; transition:0.3s; pointer-events:none; }
.toast.show { opacity:1; }
</style>
</head>
<body>

<header>
  <div class="logo"><div class="logo-icon"><span></span><span></span><span></span><span></span></div><h1>QRgen Studio</h1></div>
  <nav>
    <button class="tab active" onclick="switchView('create', this)">Créer</button>
    <button class="tab" onclick="switchView('gallery', this)">Galerie <span class="badge" id="b-total">0</span></button>
  </nav>
</header>

<div id="ocr-loader">
    <div style="font-size: 1.2rem; margin-bottom: 10px; font-weight: 800;">Traitement & Analyse...</div>
    <div id="ocr-perc" style="font-family: var(--mono);">0%</div>
</div>

<div id="crop-modal">
    <div class="crop-container"><img id="image-to-crop"></div>
    <div class="crop-controls">
        <button onclick="closeCrop()" style="flex:1; padding:15px; border-radius:10px; border:none; background:#eee;">Annuler</button>
        <button class="btn-main" style="flex:2" onclick="processAndOCR()">Analyser la zone</button>
    </div>
</div>

<div id="temp-qr"></div>

<main id="view-create" class="view active">
  <div class="create-wrap">
    <h2 style="font-size:1.8rem; font-weight:800;">Nouveau QR</h2>
    <div class="field-group">
      <label>Nom</label>
      <input type="text" id="in-title" placeholder="Ex: WiFi">
    </div>
    <div class="field-group">
      <div style="display:flex; justify-content: space-between; align-items: flex-end;">
        <label>Contenu</label>
        <button class="ocr-trigger" onclick="document.getElementById('ocr-input').click()">📷 Scanner Texte</button>
      </div>
      <input type="file" id="ocr-input" style="display:none" accept="image/*" onchange="openCropper(event)">
      <textarea id="in-text" rows="5" placeholder="Saisir ou scanner..."></textarea>
    </div>
    <button class="btn-main" onclick="createNew()">Générer et Enregistrer</button>
  </div>
</main>

<main id="view-gallery" class="view">
    <div id="display-grid" class="gallery-grid"></div>
</main>

<div id="focus-mode" class="focus-overlay">
    <div class="focus-card">
        <h2 id="focus-title"></h2>
        <div id="focus-qr-display" style="background:white; padding:10px; border-radius:10px;"></div>
        <button class="btn-main" style="width:100%" onclick="closeFocus()">Fermer</button>
    </div>
</div>

<div id="toast" class="toast"></div>

<script>
let items = JSON.parse(localStorage.getItem('qr_items_v1') || '[]');
let cropper;

function switchView(v, btn) {
    document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
    document.getElementById('view-' + v).classList.add('active');
    btn.classList.add('active');
    if(v === 'gallery') render();
}

function openCropper(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
        const img = document.getElementById('image-to-crop');
        img.src = e.target.result;
        document.getElementById('crop-modal').style.display = 'flex';
        if (cropper) cropper.destroy();
        cropper = new Cropper(img, { viewMode: 1 });
    };
    reader.readAsDataURL(file);
}

// FONCTION DE TRAITEMENT D'IMAGE POUR AIDER L'OCR
async function processAndOCR() {
    if (!cropper) return;
    const loader = document.getElementById('ocr-loader');
    loader.style.display = 'flex';

    // 1. On récupère le canvas du recadrage
    const canvas = cropper.getCroppedCanvas();
    const ctx = canvas.getContext('2d');
    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const data = imageData.data;

    // 2. FILTRE NOIR ET BLANC + CONTRASTE (Seuillage)
    for (let i = 0; i < data.length; i += 4) {
        const avg = (data[i] + data[i + 1] + data[i + 2]) / 3;
        // Si le pixel est plutôt clair, il devient blanc pur (255), sinon noir pur (0)
        const threshold = avg > 128 ? 255 : 0; 
        data[i] = data[i+1] = data[i+2] = threshold;
    }
    ctx.putImageData(imageData, 0, 0);

    // 3. Conversion en BLOB pour Tesseract
    const processedBlob = await new Promise(res => canvas.toBlob(res, 'image/png'));
    closeCrop();

    try {
        // On utilise FRA + ENG pour éviter les erreurs sur les liens ou codes
        const result = await Tesseract.recognize(processedBlob, 'fra+eng', {
            logger: m => { if(m.status === 'recognizing text') document.getElementById('ocr-perc').innerText = Math.round(m.progress * 100) + "%"; }
        });
        document.getElementById('in-text').value = result.data.text.trim();
        showToast("Analyse terminée !");
    } catch (e) { showToast("Erreur OCR"); }
    loader.style.display = 'none';
}

function closeCrop() {
    document.getElementById('crop-modal').style.display = 'none';
    if(cropper) cropper.destroy();
    document.getElementById('ocr-input').value = "";
}

function createNew() {
    const t = document.getElementById('in-title').value.trim();
    const txt = document.getElementById('in-text').value.trim();
    if(!t || !txt) return showToast("Champs vides");
    
    const tempArea = document.getElementById('temp-qr');
    tempArea.innerHTML = ""; 
    new QRCode(tempArea, { text: txt, width: 300, height: 300 });

    setTimeout(() => {
        const img = tempArea.querySelector('img') || tempArea.querySelector('canvas');
        const finalImg = img.toDataURL ? img.toDataURL() : img.src;
        items.unshift({ id: Date.now(), title: t, img: finalImg });
        localStorage.setItem('qr_items_v1', JSON.stringify(items));
        updateCount();
        showToast("QR Créé !");
    }, 500);
}

function render() {
    const grid = document.getElementById('display-grid');
    grid.innerHTML = items.map(item => `
        <div class="qr-card" onclick="openFocus('${item.title}', '${item.img}')">
            <img src="${item.img}">
            <p style="font-size:0.7rem; font-weight:800;">${item.title}</p>
        </div>
    `).join('');
}

function openFocus(title, img) {
    document.getElementById('focus-title').innerText = title;
    document.getElementById('focus-qr-display').innerHTML = `<img src="${img}" style="width:200px">`;
    document.getElementById('focus-mode').style.display = 'flex';
}

function closeFocus() { document.getElementById('focus-mode').style.display = 'none'; }
function updateCount() { document.getElementById('b-total').innerText = items.length; }
function showToast(m) {
    const t = document.getElementById('toast');
    t.innerText = m; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
}
updateCount();
</script>
</body>
</html>
