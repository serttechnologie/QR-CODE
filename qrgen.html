<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QRgen</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Bricolage+Grotesque:wght@400;600;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root {
  --bg: #f5f2eb;
  --paper: #fdfbf7;
  --ink: #1a1814;
  --mid: #8a8578;
  --accent: #d4621a;
  --star: #e8a020;
  --border: #d8d3c8;
  --green: #2d8a5e;
  --mono: 'DM Mono', monospace;
  --sans: 'Bricolage Grotesque', sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--ink); font-family:var(--sans); min-height:100vh; display:flex; flex-direction:column; }

/* HEADER */
header {
  border-bottom:2px solid var(--ink); padding:0 40px;
  display:flex; align-items:stretch; justify-content:space-between;
  background:var(--paper); position:sticky; top:0; z-index:100; height:60px;
}
.logo { display:flex; align-items:center; gap:10px; }
.logo-icon { width:30px;height:30px;background:var(--ink);border-radius:5px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:2px;padding:5px; }
.logo-icon span { background:var(--paper); border-radius:1px; }
.logo h1 { font-size:1.1rem; font-weight:800; letter-spacing:-.03em; }
.logo h1 em { font-style:normal; color:var(--accent); }

nav { display:flex; align-items:stretch; }
.tab { font-family:var(--mono);font-size:.72rem;letter-spacing:.06em;padding:0 24px;border:none;border-bottom:3px solid transparent;background:transparent;color:var(--mid);cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:8px;font-weight:500;margin-bottom:-2px; }
.tab:hover { color:var(--ink); }
.tab.active { color:var(--ink); border-bottom-color:var(--accent); }
.badge { display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;background:var(--accent);color:white;border-radius:9px;font-size:.6rem;padding:0 4px;font-weight:700; }
.badge.s { background:var(--star); }

/* VIEWS */
.view { display:none; }
.view.active { display:block; }

/* ══ CRÉER ══ */
.create-wrap { max-width:520px; margin:0 auto; padding:64px 40px; display:flex; flex-direction:column; gap:28px; }
.create-heading { font-size:2.2rem; font-weight:800; letter-spacing:-.05em; line-height:1.1; }
.create-heading em { font-style:normal; color:var(--accent); }
.field-group { display:flex; flex-direction:column; gap:8px; }
label { font-size:.8rem; font-weight:600; display:flex; align-items:center; gap:6px; }
.req { color:var(--accent); }
input[type="text"], textarea { font-family:var(--mono);font-size:.88rem;background:var(--paper);border:1.5px solid var(--border);color:var(--ink);border-radius:8px;padding:13px 16px;width:100%;outline:none;transition:border-color .15s;line-height:1.6; }
input[type="text"]:focus, textarea:focus { border-color:var(--ink); }
input.title-field { font-family:var(--sans);font-size:1.05rem;font-weight:700;letter-spacing:-.02em;border-width:2px; }
textarea { height:110px; resize:none; }
.hint { font-family:var(--mono); font-size:.63rem; color:var(--mid); }
.success-banner { display:none;align-items:center;gap:12px;background:#edf7f2;border:1.5px solid var(--green);border-radius:8px;padding:14px 18px; animation:fadeIn .3s ease; }
.success-banner.show { display:flex; }
.sb-icon { font-size:1.3rem; }
.sb-text { flex:1; }
.sb-title { font-weight:700;font-size:.9rem;color:var(--green); }
.sb-sub { font-family:var(--mono);font-size:.7rem;color:var(--mid);margin-top:2px; }
.sb-link { font-family:var(--mono);font-size:.72rem;color:var(--green);cursor:pointer;text-decoration:underline;white-space:nowrap; }
.btn-generate { font-family:var(--sans);font-size:1rem;font-weight:700;background:var(--ink);color:var(--paper);border:none;border-radius:10px;padding:18px 28px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;width:100%;transition:background .15s,transform .1s;letter-spacing:-.01em; }
.btn-generate:hover { background:#2d2a24; transform:translateY(-1px); }
.btn-generate:active { transform:translateY(0); }

/* ══ GALERIE ══ */
.gallery-wrap { max-width:1100px; margin:0 auto; padding:36px 40px; width:100%; }

.filters { display:flex; align-items:center; gap:8px; margin-bottom:24px; flex-wrap:wrap; }
.filter-btn { font-family:var(--mono);font-size:.72rem;letter-spacing:.04em;padding:7px 16px;border-radius:20px;border:1.5px solid var(--border);background:var(--paper);color:var(--mid);cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:6px; }
.filter-btn:hover { border-color:var(--ink); color:var(--ink); }
.filter-btn.active { background:var(--ink); border-color:var(--ink); color:var(--paper); }
.filter-btn.fav-f.active { background:var(--star); border-color:var(--star); }

.view-toggle { margin-left:auto;display:flex;border:1.5px solid var(--border);border-radius:7px;overflow:hidden;background:var(--paper); }
.vt { padding:7px 11px;border:none;background:transparent;color:var(--mid);cursor:pointer;transition:all .15s;display:flex;align-items:center; }
.vt:hover { color:var(--ink); }
.vt.active { background:var(--ink); color:var(--paper); }
.vt svg { width:15px;height:15px; }

/* GRID */
.gallery-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:16px; }
.gallery-item { background:var(--paper);border:1.5px solid var(--border);border-radius:12px;padding:18px 14px 14px;display:flex;flex-direction:column;align-items:center;gap:10px;cursor:pointer;transition:border-color .15s,transform .15s,box-shadow .15s;position:relative;animation:fadeIn .25s ease both; }
.gallery-item:hover { border-color:var(--ink);transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.07); }
.gi-fav { position:absolute;top:9px;right:9px;width:26px;height:26px;border:none;background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:50%;transition:background .15s;font-size:.95rem;z-index:2; }
.gi-fav:hover { background:rgba(0,0,0,.06); }
.gi-qr { width:72px;height:72px;flex-shrink:0;pointer-events:none; }
.gi-qr canvas,.gi-qr img { width:72px!important;height:72px!important; }
.gi-title { font-size:.9rem;font-weight:700;letter-spacing:-.02em;text-align:center;line-height:1.3;word-break:break-word;width:100%; }
.gi-content { font-family:var(--mono);font-size:.63rem;color:var(--mid);text-align:center;word-break:break-all;line-height:1.5;width:100%;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical; }
.gi-actions { display:flex;gap:5px;width:100%;opacity:0;transition:opacity .15s; }
.gallery-item:hover .gi-actions { opacity:1; }
.gi-btn { flex:1;font-family:var(--mono);font-size:.63rem;padding:6px;border-radius:5px;border:1.5px solid var(--border);background:var(--bg);color:var(--ink);cursor:pointer;text-align:center;transition:all .12s; }
.gi-btn:hover { background:var(--ink);color:var(--paper);border-color:var(--ink); }
.gi-btn.d:hover { background:#c0392b;border-color:#c0392b;color:white; }

/* LIST */
.gallery-list { display:flex;flex-direction:column;gap:7px; }
.list-item { background:var(--paper);border:1.5px solid var(--border);border-radius:10px;padding:13px 18px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:border-color .15s;animation:fadeIn .2s ease both; }
.list-item:hover { border-color:var(--ink); }
.li-thumb { width:48px;height:48px;flex-shrink:0; }
.li-thumb canvas,.li-thumb img { width:48px!important;height:48px!important;border-radius:4px; }
.li-info { flex:1;overflow:hidden; }
.li-title { font-size:.92rem;font-weight:700;letter-spacing:-.02em; }
.li-content { font-family:var(--mono);font-size:.66rem;color:var(--mid);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:3px; }
.li-date { font-size:.62rem;color:var(--border);margin-top:2px;font-family:var(--mono); }
.li-right { display:flex;align-items:center;gap:7px;flex-shrink:0; }
.li-fav { font-size:1rem;background:none;border:none;cursor:pointer;padding:4px; }
.li-btn { font-family:var(--mono);font-size:.66rem;padding:7px 10px;border-radius:6px;border:1.5px solid var(--border);background:var(--bg);color:var(--ink);cursor:pointer;transition:all .12s; }
.li-btn:hover { background:var(--ink);color:var(--paper);border-color:var(--ink); }
.li-del { font-size:.8rem;background:none;border:none;color:var(--border);cursor:pointer;padding:4px 6px;transition:color .12s; }
.li-del:hover { color:#c0392b; }

/* CARD */
.card-wrap { display:none;flex-direction:column;align-items:center;gap:20px;padding:8px 0 32px; }
.card-wrap.on { display:flex; }
.card-nav-row { display:flex;align-items:center;gap:18px; }
.cnav { width:42px;height:42px;border-radius:50%;border:2px solid var(--border);background:var(--paper);color:var(--ink);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1rem;transition:all .15s; }
.cnav:hover:not(:disabled) { border-color:var(--ink);background:var(--ink);color:var(--paper); }
.cnav:disabled { opacity:.22;cursor:default; }
.ccounter { font-family:var(--mono);font-size:.73rem;color:var(--mid);min-width:56px;text-align:center; }

.big-card { background:var(--paper);border:2px solid var(--ink);border-radius:18px;padding:44px 38px 34px;display:flex;flex-direction:column;align-items:center;gap:18px;position:relative;width:100%;max-width:390px;animation:cardPop .22s cubic-bezier(.34,1.56,.64,1); }
@keyframes cardPop { from{opacity:0;transform:scale(.94)} to{opacity:1;transform:scale(1)} }
.big-card::before,.big-card::after { content:'';position:absolute;width:16px;height:16px;border-color:var(--accent);border-style:solid; }
.big-card::before { top:11px;left:11px;border-width:2px 0 0 2px; }
.big-card::after  { bottom:11px;right:11px;border-width:0 2px 2px 0; }
.cf-btn { position:absolute;top:12px;right:12px;font-size:1.25rem;background:none;border:none;cursor:pointer;padding:4px;border-radius:50%;transition:background .15s; }
.cf-btn:hover { background:rgba(0,0,0,.06); }
.big-title { font-size:2rem;font-weight:800;letter-spacing:-.05em;text-align:center;line-height:1.15;word-break:break-word;max-width:300px; }
.big-qr { width:140px;height:140px; }
.big-qr canvas,.big-qr img { width:140px!important;height:140px!important; }
.big-txt { font-family:var(--mono);font-size:.72rem;color:var(--mid);text-align:center;word-break:break-all;line-height:1.6;max-width:290px; }
.card-actions { display:flex;gap:9px;width:100%; }
.ca-btn { flex:1;font-family:var(--mono);font-size:.74rem;padding:11px;border-radius:7px;border:1.5px solid var(--border);background:var(--bg);color:var(--ink);cursor:pointer;transition:all .12s;text-align:center; }
.ca-btn:hover { background:var(--ink);color:var(--paper);border-color:var(--ink); }
.ca-btn.p { background:var(--accent);border-color:var(--accent);color:white; }
.ca-btn.p:hover { background:#b8521a; }
.ca-btn.del:hover { background:#c0392b;border-color:#c0392b;color:white; }

.dots { display:flex;gap:5px;flex-wrap:wrap;justify-content:center;max-width:390px; }
.dot { width:7px;height:7px;border-radius:50%;background:var(--border);cursor:pointer;transition:background .15s,transform .15s; }
.dot.on { background:var(--ink);transform:scale(1.35); }
.dot.fav { background:var(--star); }

/* EMPTY */
.g-empty { display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:72px 0;color:var(--mid); }
.g-empty svg { width:48px;height:48px;opacity:.28; }
.g-empty p { font-family:var(--mono);font-size:.78rem;text-align:center;line-height:1.7; }
.g-empty button { font-family:var(--sans);font-size:.85rem;font-weight:600;background:var(--ink);color:var(--paper);border:none;border-radius:6px;padding:10px 22px;cursor:pointer; }

/* TOAST */
.toast { position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(14px);background:var(--ink);color:var(--paper);font-family:var(--mono);font-size:.76rem;padding:9px 20px;border-radius:8px;opacity:0;transition:all .22s;pointer-events:none;z-index:999;white-space:nowrap; }
.toast.on { opacity:1;transform:translateX(-50%) translateY(0); }

footer { margin-top:auto;border-top:1px solid var(--border);padding:12px 40px;display:flex;justify-content:space-between; }
footer p { font-family:var(--mono);font-size:.63rem;color:var(--mid); }

/* SEARCH */
.search-row { margin-bottom:16px; position:relative; }
.search-row input { font-family:var(--mono);font-size:.82rem;background:var(--paper);border:1.5px solid var(--border);color:var(--ink);border-radius:8px;padding:10px 16px 10px 38px;width:100%;outline:none;transition:border-color .15s; }
.search-row input:focus { border-color:var(--ink); }
.search-row .si { position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--mid);pointer-events:none; }
.search-row .sc { position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--mid);cursor:pointer;font-size:.9rem;padding:2px 6px;border-radius:4px;transition:color .12s;display:none; }
.search-row .sc.vis { display:block; }
.search-row .sc:hover { color:var(--ink); }
.swipe-hint { font-family:var(--mono);font-size:.62rem;color:var(--border);text-align:center;margin-top:-8px; }

@keyframes fadeIn { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
    <h1>QR<em>gen</em></h1>
  </div>
  <nav>
    <button class="tab active" onclick="showView('create')">Créer</button>
    <button class="tab" onclick="showView('gallery')">Galerie <span class="badge" id="badge-all">0</span></button>
  </nav>
</header>

<!-- CRÉER -->
<div class="view active" id="view-create">
  <div class="create-wrap">
    <div class="create-heading">Nouveau<br><em>QR code</em></div>

    <div class="field-group">
      <label>Titre <span class="req">*</span></label>
      <input type="text" class="title-field" id="qr-title" placeholder="ex : WiFi salon, Chemin bureau…" autocomplete="off">
    </div>

    <div class="field-group">
      <label>Contenu <span class="req">*</span></label>
      <textarea id="qr-text" placeholder="URL, texte, numéro…"></textarea>
      <p class="hint">Ctrl+Entrée pour générer rapidement</p>
    </div>

    <div class="success-banner" id="success-banner">
      <span class="sb-icon">✓</span>
      <div class="sb-text">
        <div class="sb-title" id="sb-t">QR code sauvegardé !</div>
        <div class="sb-sub">Retrouvez-le dans la galerie</div>
      </div>
      <span class="sb-link" onclick="showView('gallery')">Voir →</span>
    </div>

    <button class="btn-generate" onclick="generateQR()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
        <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="3" height="3"/>
        <rect x="18" y="14" width="3" height="3"/><rect x="14" y="18" width="3" height="3"/><rect x="18" y="18" width="3" height="3"/>
      </svg>
      Générer &amp; sauvegarder
    </button>
  </div>
</div>

<!-- GALERIE -->
<div class="view" id="view-gallery">
  <div class="gallery-wrap">

    <div class="search-row">
      <svg class="si" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="search-input" placeholder="Rechercher par titre…" oninput="onSearch(this.value)">
      <button class="sc" id="search-clear" onclick="clearSearch()">✕</button>
    </div>

    <div class="filters">
      <button class="filter-btn active" id="f-all" onclick="setFilter('all')">Tous <span class="badge" id="fb-all">0</span></button>
      <button class="filter-btn fav-f" id="f-fav" onclick="setFilter('fav')">★ Favoris <span class="badge s" id="fb-fav">0</span></button>
      <div class="view-toggle">
        <button class="vt active" id="vt-grid" onclick="setMode('grid')" title="Grille">
          <svg viewBox="0 0 16 16" fill="currentColor"><rect x="1" y="1" width="6" height="6" rx="1"/><rect x="9" y="1" width="6" height="6" rx="1"/><rect x="1" y="9" width="6" height="6" rx="1"/><rect x="9" y="9" width="6" height="6" rx="1"/></svg>
        </button>
        <button class="vt" id="vt-list" onclick="setMode('list')" title="Liste">
          <svg viewBox="0 0 16 16" fill="currentColor"><rect x="1" y="2" width="14" height="3" rx="1"/><rect x="1" y="7" width="14" height="3" rx="1"/><rect x="1" y="12" width="14" height="3" rx="1"/></svg>
        </button>
        <button class="vt" id="vt-card" onclick="setMode('card')" title="Carte">
          <svg viewBox="0 0 16 16" fill="currentColor"><rect x="2" y="1" width="12" height="14" rx="2"/><rect x="4" y="4" width="8" height="1" rx=".5" fill="white"/><rect x="4" y="7" width="8" height="4" rx="1" fill="white"/></svg>
        </button>
      </div>
    </div>

    <div class="g-empty" id="g-empty" style="display:none;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>
      <p id="empty-msg">Aucun QR code.<br>Créez-en un !</p>
      <button onclick="showView('create')">Créer mon premier QR</button>
    </div>

    <div class="gallery-grid" id="g-grid"></div>
    <div class="gallery-list" id="g-list" style="display:none;"></div>

    <div class="card-wrap" id="g-card">
      <div class="card-nav-row">
        <button class="cnav" id="cp" onclick="cardNav(-1)">←</button>
        <span class="ccounter" id="cc">1 / 1</span>
        <button class="cnav" id="cn" onclick="cardNav(+1)">→</button>
      </div>
      <div class="big-card" id="big-card" ontouchstart="swipeStart(event)" ontouchend="swipeEnd(event)">
        <button class="cf-btn" id="cf" onclick="toggleFavCard()">☆</button>
        <div class="big-title" id="c-title"></div>
        <div class="big-qr" id="c-qr"></div>
        <div class="big-txt" id="c-txt"></div>
        <div class="card-actions">
          <button class="ca-btn p" id="c-dl">↓ PNG</button>
          <button class="ca-btn del" id="c-del">✕ Supprimer</button>
        </div>
      </div>
      <div class="dots" id="c-dots"></div>
      <p class="swipe-hint">← glissez pour naviguer →</p>
    </div>

  </div>
</div>

<div id="hqr" style="position:absolute;left:-9999px;top:-9999px;"></div>
<div class="toast" id="toast"></div>

<footer>
  <p>QRgen — stockage local, aucune donnée envoyée</p>
  <p id="finfo">0 sauvegardé(s)</p>
</footer>

<script>
const KEY = 'qrgen_v2';
let codes = [];
try { codes = JSON.parse(localStorage.getItem(KEY)) || []; } catch {}
const save = () => localStorage.setItem(KEY, JSON.stringify(codes));

let filter = 'all', mode = 'grid', ci = 0, searchQ = '';

updateBadges(); updateFooter();

// ── SWIPE tactile (vue carte) ──
let _sx = null;
document.getElementById('big-card').addEventListener('touchstart', e => { _sx = e.touches[0].clientX; }, { passive: true });
document.getElementById('big-card').addEventListener('touchend', e => {
  if (_sx === null) return;
  const dx = e.changedTouches[0].clientX - _sx; _sx = null;
  if (Math.abs(dx) < 40) return;
  dx < 0 ? cardNav(+1) : cardNav(-1);
});

// ── SEARCH ──
function onSearch(val) {
  searchQ = val.trim().toLowerCase();
  ci = 0;
  document.getElementById('search-clear').classList.toggle('vis', searchQ.length > 0);
  render();
}
function clearSearch() {
  document.getElementById('search-input').value = '';
  onSearch('');
}

// ── SWIPE ──
let swipeX = 0;
function swipeStart(e) { swipeX = e.touches[0].clientX; }
function swipeEnd(e) {
  const dx = e.changedTouches[0].clientX - swipeX;
  if (Math.abs(dx) < 40) return;
  dx < 0 ? cardNav(+1) : cardNav(-1);
}

function showView(n) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('view-' + n).classList.add('active');
  document.querySelectorAll('.tab')[n === 'create' ? 0 : 1].classList.add('active');
  if (n === 'gallery') render();
}

function generateQR() {
  const title = document.getElementById('qr-title').value.trim();
  const text  = document.getElementById('qr-text').value.trim();
  if (!title) { hl('qr-title'); toast('⚠ Ajoutez un titre'); return; }
  if (!text)  { hl('qr-text');  toast('⚠ Ajoutez du contenu'); return; }

  const h = document.getElementById('hqr');
  h.innerHTML = '';
  new QRCode(h, { text, width:300, height:300, colorDark:'#1a1814', colorLight:'#ffffff', correctLevel:QRCode.CorrectLevel.M });

  setTimeout(() => {
    const c = h.querySelector('canvas');
    const dataURL = c ? c.toDataURL('image/png') : '';
    codes.unshift({ id: Date.now(), title, text, dataURL, favorite: false,
      date: new Date().toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'numeric'}) });
    save(); updateBadges(); updateFooter();
    document.getElementById('qr-title').value = '';
    document.getElementById('qr-text').value  = '';
    document.getElementById('sb-t').textContent = `"${title}" sauvegardé !`;
    const b = document.getElementById('success-banner');
    b.classList.add('show');
    setTimeout(() => b.classList.remove('show'), 4000);
  }, 100);
}

const filtered = () => {
  let list = filter === 'fav' ? codes.filter(c => c.favorite) : codes;
  if (searchQ) list = list.filter(c => c.title.toLowerCase().includes(searchQ));
  return list;
};

function setFilter(f) {
  filter = f; ci = 0;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('f-' + f).classList.add('active');
  render();
}

function setMode(m) {
  mode = m; ci = 0;
  document.querySelectorAll('.vt').forEach(b => b.classList.remove('active'));
  document.getElementById('vt-' + m).classList.add('active');
  render();
}

function render() {
  const list = filtered();
  const empty = document.getElementById('g-empty');
  ['g-grid','g-list'].forEach(id => document.getElementById(id).style.display='none');
  document.getElementById('g-card').classList.remove('on');
  empty.style.display = 'none';

  if (!list.length) {
    empty.style.display = 'flex';
    document.getElementById('empty-msg').innerHTML =
      searchQ ? `Aucun résultat pour "<b>${esc(searchQ)}</b>"` :
      filter === 'fav' ? 'Aucun favori.<br>Étoilez un QR code !' : 'Aucun QR code.<br>Créez-en un !';
    return;
  }
  if (mode === 'grid') { document.getElementById('g-grid').style.display='grid'; renderGrid(list); }
  else if (mode === 'list') { document.getElementById('g-list').style.display='flex'; renderList(list); }
  else { document.getElementById('g-card').classList.add('on'); renderCard(list, ci); }
}

function renderGrid(list) {
  const el = document.getElementById('g-grid'); el.innerHTML = '';
  list.forEach((code, i) => {
    const d = document.createElement('div');
    d.className = 'gallery-item'; d.style.animationDelay = (i*30)+'ms';
    d.innerHTML = `
      <button class="gi-fav" onclick="event.stopPropagation();toggleFav(${code.id})">${code.favorite?'★':'☆'}</button>
      <div class="gi-title">${esc(code.title)}</div>
      <div class="gi-qr" id="gqr${code.id}"></div>
      <div class="gi-content">${esc(code.text)}</div>
      <div class="gi-actions">
        <button class="gi-btn" onclick="event.stopPropagation();dl(${code.id})">↓ PNG</button>
        <button class="gi-btn d" onclick="event.stopPropagation();del(${code.id})">✕</button>
      </div>`;
    d.addEventListener('click', () => openCard(code));
    el.appendChild(d);
    setTimeout(() => {
      const q = document.getElementById('gqr'+code.id); if(!q) return;
      if (code.dataURL) { const img=document.createElement('img'); img.src=code.dataURL; img.style.cssText='width:90px;height:90px;'; q.appendChild(img); }
      else new QRCode(q,{text:code.text,width:90,height:90,colorDark:'#1a1814',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.M});
    }, i*20);
  });
}

function renderList(list) {
  const el = document.getElementById('g-list'); el.innerHTML = '';
  list.forEach((code, i) => {
    const d = document.createElement('div');
    d.className = 'list-item'; d.style.animationDelay = (i*20)+'ms';
    d.innerHTML = `
      <div class="li-thumb" id="lt${code.id}"></div>
      <div class="li-info">
        <div class="li-title">${esc(code.title)}</div>
        <div class="li-content">${esc(code.text)}</div>
        <div class="li-date">${code.date}</div>
      </div>
      <div class="li-right">
        <button class="li-fav" onclick="event.stopPropagation();toggleFav(${code.id})" style="color:${code.favorite?'var(--star)':'var(--border)'}">${code.favorite?'★':'☆'}</button>
        <button class="li-btn" onclick="event.stopPropagation();dl(${code.id})">↓ PNG</button>
        <button class="li-del" onclick="event.stopPropagation();del(${code.id})">✕</button>
      </div>`;
    d.addEventListener('click', () => openCard(code));
    el.appendChild(d);
    setTimeout(() => {
      const t = document.getElementById('lt'+code.id); if(!t) return;
      if (code.dataURL) { const img=document.createElement('img'); img.src=code.dataURL; img.style.cssText='width:48px;height:48px;border-radius:4px;'; t.appendChild(img); }
      else new QRCode(t,{text:code.text,width:48,height:48,colorDark:'#1a1814',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.M});
    }, i*20);
  });
}

function renderCard(list, idx) {
  if (idx < 0) idx = 0; if (idx >= list.length) idx = list.length-1; ci = idx;
  const code = list[idx];
  document.getElementById('c-title').textContent = code.title;
  document.getElementById('c-txt').textContent   = code.text;
  document.getElementById('cc').textContent       = `${idx+1} / ${list.length}`;
  const fb = document.getElementById('cf');
  fb.textContent = code.favorite ? '★' : '☆';
  fb.style.color = code.favorite ? 'var(--star)' : 'var(--mid)';
  document.getElementById('cp').disabled = idx === 0;
  document.getElementById('cn').disabled = idx === list.length-1;

  const qEl = document.getElementById('c-qr'); qEl.innerHTML = '';
  if (code.dataURL) { const img=document.createElement('img'); img.src=code.dataURL; img.style.cssText='width:170px;height:170px;'; qEl.appendChild(img); }
  else new QRCode(qEl,{text:code.text,width:170,height:170,colorDark:'#1a1814',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.M});

  document.getElementById('c-dl').onclick  = () => dl(code.id);
  document.getElementById('c-del').onclick = () => del(code.id);

  // dots
  const dotsEl = document.getElementById('c-dots'); dotsEl.innerHTML = '';
  list.forEach((c, i) => {
    const dot = document.createElement('div');
    dot.className = 'dot'+(i===idx?' on':'')+(c.favorite?' fav':'');
    dot.title = c.title;
    dot.onclick = () => renderCard(list, i);
    dotsEl.appendChild(dot);
  });

  const card = document.getElementById('big-card');
  card.style.animation='none'; card.offsetHeight; card.style.animation='';
}

function cardNav(d) { renderCard(filtered(), ci+d); }

function toggleFavCard() {
  const list = filtered(); const code = list[ci]; if(!code) return; toggleFav(code.id);
}

function openCard(code) {
  setMode('card');
  document.querySelectorAll('.vt').forEach(b=>b.classList.remove('active'));
  document.getElementById('vt-card').classList.add('active');
  const list = filtered(); const idx = list.findIndex(c=>c.id===code.id);
  ci = idx >= 0 ? idx : 0; render();
}

function toggleFav(id) {
  const code = codes.find(c=>c.id===id); if(!code) return;
  code.favorite = !code.favorite; save(); updateBadges();
  render(); toast(code.favorite ? '★ Ajouté aux favoris' : '☆ Retiré des favoris');
}

function del(id) {
  if (!confirm('Supprimer ce QR code ?')) return;
  codes = codes.filter(c=>c.id!==id); save(); updateBadges(); updateFooter();
  const list = filtered(); if (ci >= list.length) ci = Math.max(0, list.length-1);
  render(); toast('QR code supprimé');
}

function dl(id) {
  const code = codes.find(c=>c.id===id); if(!code||!code.dataURL) return;
  const a = document.createElement('a');
  a.download = code.title.replace(/\s+/g,'-').toLowerCase()+'.png';
  a.href = code.dataURL; a.click();
}

function updateBadges() {
  const t = codes.length, f = codes.filter(c=>c.favorite).length;
  document.getElementById('badge-all').textContent = t;
  document.getElementById('fb-all').textContent = t;
  document.getElementById('fb-fav').textContent = f;
}
function updateFooter() { document.getElementById('finfo').textContent = codes.length+' sauvegardé(s)'; }
function toast(msg) {
  const t = document.getElementById('toast'); t.textContent=msg;
  t.classList.add('on'); setTimeout(()=>t.classList.remove('on'), 2200);
}
function hl(id) { const el=document.getElementById(id); el.style.borderColor='#c0392b'; el.focus(); setTimeout(()=>el.style.borderColor='',1000); }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

document.getElementById('qr-text').addEventListener('keydown', e => { if(e.key==='Enter'&&e.ctrlKey) generateQR(); });
document.addEventListener('keydown', e => {
  if (document.getElementById('view-gallery').classList.contains('active') && mode==='card') {
    if (e.key==='ArrowLeft') cardNav(-1);
    if (e.key==='ArrowRight') cardNav(+1);
  }
});
</script>
</body>
</html>
